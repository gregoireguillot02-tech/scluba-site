<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Portail club (/club/*) : balle de golf Scluba sur fond brun "wood".
       Distinct du favicon-ops (ambre + S) et du favicon golfeur (vert + S). -->
  <defs>
    <radialGradient id="clubBall" cx="32%" cy="28%" r="78%">
      <stop offset="0%"   stop-color="#FFFFFF" />
      <stop offset="55%"  stop-color="#E8E8E8" />
      <stop offset="100%" stop-color="#909090" />
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#2D1B0E" />
  <g transform="translate(5.333 5.333) scale(1.6667)">
    <circle cx="16" cy="16" r="13.8" fill="url(#clubBall)" />
    <g fill="#000" opacity="0.13">
      <circle cx="11" cy="10" r="0.8" /><circle cx="16" cy="10" r="0.8" /><circle cx="21" cy="10" r="0.8" />
      <circle cx="11" cy="16" r="0.8" /><circle cx="16" cy="16" r="0.8" /><circle cx="21" cy="16" r="0.8" />
      <circle cx="11" cy="22" r="0.8" /><circle cx="16" cy="22" r="0.8" /><circle cx="21" cy="22" r="0.8" />
    </g>
    <ellipse cx="11.5" cy="9" rx="3.6" ry="2.2" fill="#FFFFFF" opacity="0.6" />
  </g>
</svg>
